apiVersion: v1
kind: Secret
metadata:
  name: grafana-datasources
  namespace: monitoring
  labels:
    app.kubernetes.io/name: grafana
    app.kubernetes.io/part-of: banking
stringData:
  datasources.yaml: |
    apiVersion: 1
    datasources:
      - name: Prometheus
        type: prometheus
        url: http://prometheus:9090
        access: proxy
        isDefault: true
        editable: true

      - name: ElasticSearch
        type: elasticsearch
        url: http://elasticsearch-master:9200
        access: proxy
        database: "[banking-]YYYY.MM.DD"
        jsonData:
          esVersion: 8.0.0
          timeField: "@timestamp"
          interval: Daily
        editable: true

      - name: Loki
        type: loki
        url: http://loki:3100
        access: proxy
        jsonData:
          maxLines: 1000
        editable: true

      - name: Jaeger
        type: jaeger
        url: http://jaeger-query:16686
        access: proxy
        editable: true
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasources-config
  namespace: monitoring
  labels:
    app.kubernetes.io/name: grafana
    app.kubernetes.io/part-of: banking
data:
  datasources.yaml: |
    apiVersion: 1
    datasources:
      - name: Prometheus
        type: prometheus
        url: http://prometheus:9090
        access: proxy
        isDefault: true
      - name: ElasticSearch
        type: elasticsearch
        url: http://elasticsearch-master:9200
        access: proxy
        database: "[banking-]YYYY.MM.DD"
        jsonData:
          esVersion: 8.0.0
          timeField: "@timestamp"
          interval: Daily
      - name: Loki
        type: loki
        url: http://loki:3100
        access: proxy
      - name: Jaeger
        type: jaeger
        url: http://jaeger-query:16686
        access: proxy
