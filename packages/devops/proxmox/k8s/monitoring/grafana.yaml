---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-config
  namespace: monitoring
  labels:
    app.kubernetes.io/name: grafana
    app.kubernetes.io/part-of: banking
data:
  grafana.ini: |
    [server]
    domain = grafana.banking.internal
    root_url = https://grafana.banking.internal
    serve_from_sub_path = true

    [auth]
    disable_login_form = false
    oauth_auto_login = true

    [auth.github]
    enabled = true
    allow_sign_up = true
    client_id = ${GITHUB_CLIENT_ID}
    client_secret = ${GITHUB_CLIENT_SECRET}
    scopes = user:email,read:org
    auth_url = https://github.com/login/oauth/authorize
    token_url = https://github.com/login/oauth/access_token
    api_url = https://api.github.com/user

    [security]
    admin_user = admin

    [alerting]
    enabled = true
    execute_alerts = true

    [unified_alerting]
    enabled = true

    [explore]
    enabled = true

    [dashboards]
    default_home_dashboard_path = /var/lib/grafana/dashboards/banking-overview.json
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboards
  namespace: monitoring
  labels:
    app.kubernetes.io/name: grafana
    app.kubernetes.io/part-of: banking
    grafana_dashboard: "1"
data:
  banking-overview.json: |
    {
      "title": "Banking Overview",
      "uid": "banking-overview",
      "version": 1,
      "panels": [
        {
          "title": "Cluster CPU",
          "type": "gauge",
          "datasource": "Prometheus",
          "targets": [
            {
              "expr": "sum(rate(node_cpu_seconds_total{mode!=\"idle\"}[5m])) / sum(count(node_cpu_seconds_total{mode=\"idle\"}) by (instance)) * 100"
            }
          ]
        },
        {
          "title": "Cluster Memory",
          "type": "gauge",
          "datasource": "Prometheus",
          "targets": [
            {
              "expr": "(1 - sum(node_memory_MemAvailable_bytes) / sum(node_memory_MemTotal_bytes)) * 100"
            }
          ]
        },
        {
          "title": "Pod Health",
          "type": "stat",
          "datasource": "Prometheus",
          "targets": [
            {
              "expr": "count(kube_pod_status_phase{phase=\"Running\"})"
            }
          ]
        },
        {
          "title": "Database Status",
          "type": "table",
          "datasource": "Prometheus",
          "targets": [
            {
              "expr": "elasticsearch_cluster_health_status"
            },
            {
              "expr": "mongodb_rs_status_member_health"
            }
          ]
        }
      ]
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: monitoring
  labels:
    app.kubernetes.io/name: grafana
    app.kubernetes.io/part-of: banking
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app: grafana
  template:
    metadata:
      labels:
        app: grafana
        app.kubernetes.io/name: grafana
    spec:
      securityContext:
        fsGroup: 472
        runAsUser: 472
      containers:
        - name: grafana
          image: grafana/grafana:11.0.0
          args:
            - "--config=/etc/grafana/grafana.ini"
          ports:
            - containerPort: 3000
              name: http
          volumeMounts:
            - name: config
              mountPath: /etc/grafana/grafana.ini
              subPath: grafana.ini
            - name: datasources
              mountPath: /etc/grafana/provisioning/datasources/datasources.yaml
              subPath: datasources.yaml
            - name: dashboards
              mountPath: /var/lib/grafana/dashboards
            - name: data
              mountPath: /var/lib/grafana
          env:
            - name: GF_SECURITY_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: grafana-admin
                  key: password
            - name: GITHUB_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: grafana-github-oauth
                  key: client-id
            - name: GITHUB_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: grafana-github-oauth
                  key: client-secret
          resources:
            requests:
              memory: 512Mi
              cpu: 200m
            limits:
              memory: 1Gi
              cpu: 500m
          livenessProbe:
            httpGet:
              path: /api/health
              port: 3000
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3000
      volumes:
        - name: config
          configMap:
            name: grafana-config
        - name: datasources
          secret:
            secretName: grafana-datasources
        - name: dashboards
          configMap:
            name: grafana-dashboards
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: microk8s-hostpath
        resources:
          requests:
            storage: 10Gi
---
apiVersion: v1
kind: Service
metadata:
  name: grafana
  namespace: monitoring
  labels:
    app.kubernetes.io/name: grafana
    app.kubernetes.io/part-of: banking
spec:
  ports:
    - port: 3000
      targetPort: 3000
      name: http
  selector:
    app: grafana
  type: ClusterIP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: grafana
  namespace: monitoring
  annotations:
    kubernetes.io/ingress.class: nginx
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/auth-type: ""
  labels:
    app.kubernetes.io/name: grafana
    app.kubernetes.io/part-of: banking
spec:
  tls:
    - hosts:
        - grafana.banking.internal
      secretName: grafana-tls
  rules:
    - host: grafana.banking.internal
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: grafana
                port:
                  number: 3000
