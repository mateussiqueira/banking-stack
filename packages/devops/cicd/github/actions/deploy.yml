name: CD

on:
  workflow_run:
    workflows: ["CI"]
    types:
      - completed
    branches: [develop, main]
  push:
    tags:
      - "v*.*.*"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

env:
  NODE_VERSION: "20"
  PNPM_VERSION: "9"

jobs:
  deploy-staging:
    name: Deploy to Staging
    if: >
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'develop') ||
      (github.event_name == 'push' && github.ref == 'refs/heads/develop')
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - uses: actions/checkout@v4
        with:
          ref: develop
          fetch-depth: 0

      - name: Configure kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: "v1.28.10"

      - name: Set kubeconfig
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBECONFIG_STAGING }}" | base64 -d > $HOME/.kube/config
          chmod 600 $HOME/.kube/config

      - name: Update image tag
        run: |
          SHORT_SHA=$(git rev-parse --short HEAD)
          sed -i "s|image: .*|image: ghcr.io/${{ github.repository }}:staging-$SHORT_SHA|g" \
            k8s/overlays/staging/deployment.yaml

      - name: Deploy to staging
        run: |
          kubectl apply -k k8s/overlays/staging/
          kubectl rollout status deployment/banking-app -n banking-staging \
            --timeout=5m

      - name: Health check
        run: |
          for i in $(seq 1 12); do
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
              "https://staging.banking.com/health" || echo "000")
            if [ "$HTTP_CODE" = "200" ]; then
              echo "Health check passed"
              exit 0
            fi
            echo "Attempt $i: $HTTP_CODE, retrying..."
            sleep 10
          done
          echo "Health check failed"
          exit 1

      - name: Notify
        uses: slackapi/slack-github-action@v2
        if: always()
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_STAGING }}
          webhook-type: incoming-webhook
          payload: |
            {
              "text": "Deploy to staging: ${{ job.status }}\nCommit: ${{ github.sha }}\nRef: ${{ github.ref }}"
            }

  deploy-production:
    name: Deploy to Production
    if: >
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main') ||
      startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    environment: production
    concurrency: production
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Configure kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: "v1.28.10"

      - name: Set kubeconfig
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBECONFIG_PRODUCTION }}" | base64 -d > $HOME/.kube/config
          chmod 600 $HOME/.kube/config

      - name: Extract version
        id: version
        run: |
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            echo "tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
            echo "image=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          else
            SHORT_SHA=$(git rev-parse --short HEAD)
            echo "tag=main-$SHORT_SHA" >> $GITHUB_OUTPUT
            echo "image=main-$SHORT_SHA" >> $GITHUB_OUTPUT
          fi

      - name: Update manifests
        run: |
          sed -i "s|image: .*|image: ghcr.io/${{ github.repository }}:${{ steps.version.outputs.image }}|g" \
            k8s/overlays/production/deployment.yaml

      - name: Deploy to production
        run: |
          kubectl apply -k k8s/overlays/production/
          kubectl rollout status deployment/banking-app -n banking \
            --timeout=10m

      - name: Health check
        run: |
          for i in $(seq 1 12); do
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
              "https://app.banking.com/health" || echo "000")
            if [ "$HTTP_CODE" = "200" ]; then
              echo "Health check passed"
              exit 0
            fi
            echo "Attempt $i: $HTTP_CODE, retrying..."
            sleep 10
          done
          echo "Health check failed"
          exit 1

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true

      - name: Notify
        uses: slackapi/slack-github-action@v2
        if: always()
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_PRODUCTION }}
          webhook-type: incoming-webhook
          payload: |
            {
              "text": "Deploy to production: ${{ job.status }}\nVersion: ${{ steps.version.outputs.tag }}\nCommit: ${{ github.sha }}"
            }
