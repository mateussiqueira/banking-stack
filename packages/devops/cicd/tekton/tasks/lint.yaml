apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: lint
  namespace: cicd
  labels:
    app.kubernetes.io/part-of: banking
spec:
  description: Run linting and static analysis
  workspaces:
    - name: source
      description: The workspace containing the source code
  params:
    - name: lint-command
      type: string
      description: The lint command to run
      default: npx eslint --format junit --output-file lint-results.xml .
    - name: strict-mode
      type: string
      description: Fail on any lint warning
      default: "true"
  results:
    - name: lint-errors
      description: Number of lint errors
    - name: lint-warnings
      description: Number of lint warnings
  steps:
    - name: install-deps
      image: node:20-slim
      workingDir: "$(workspaces.source.path)"
      script: |
        #!/bin/sh
        set -euo pipefail

        if [ -f pnpm-lock.yaml ]; then
          corepack enable
          corepack prepare pnpm@latest --activate
          pnpm install --frozen-lockfile
        elif [ -f package-lock.json ]; then
          npm ci
        elif [ -f yarn.lock ]; then
          yarn install --frozen-lockfile
        else
          npm install
        fi
    - name: eslint
      image: node:20-slim
      workingDir: "$(workspaces.source.path)"
      script: |
        #!/bin/sh
        set -euo pipefail

        if [ -f node_modules/.bin/eslint ]; then
          $(params.lint-command)
        else
          echo "ESLint not found, skipping"
        fi
    - name: prettier-check
      image: node:20-slim
      workingDir: "$(workspaces.source.path)"
      script: |
        #!/bin/sh
        set -euo pipefail

        if [ -f node_modules/.bin/prettier ]; then
          npx prettier --check .
        else
          echo "Prettier not found, skipping"
        fi
    - name: typecheck
      image: node:20-slim
      workingDir: "$(workspaces.source.path)"
      script: |
        #!/bin/sh
        set -euo pipefail

        if [ -f node_modules/.bin/tsc ]; then
          npx tsc --noEmit
        else
          echo "TypeScript not found, skipping"
        fi
    - name: parse-results
      image: node:20-slim
      workingDir: "$(workspaces.source.path)"
      script: |
        #!/bin/sh
        set -euo pipefail

        if [ -f lint-results.xml ]; then
          ERRORS=$(grep -oP 'errors="\K[^"]+' lint-results.xml | paste -sd+ | bc || echo 0)
          WARNINGS=$(grep -oP 'warnings="\K[^"]+' lint-results.xml | paste -sd+ | bc || echo 0)
          echo -n "$ERRORS" > "$(results.lint-errors.path)"
          echo -n "$WARNINGS" > "$(results.lint-warnings.path)"
          echo "Lint: $ERRORS errors, $WARNINGS warnings"

          if [ "$(params.strict-mode)" = "true" ] && [ "$WARNINGS" -gt 0 ]; then
            echo "Strict mode enabled: failing on $WARNINGS warnings"
            exit 1
          fi
        else
          echo "No lint results file found"
          echo -n "0" > "$(results.lint-errors.path)"
          echo -n "0" > "$(results.lint-warnings.path)"
        fi
