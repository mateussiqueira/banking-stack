apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: build
  namespace: cicd
  labels:
    app.kubernetes.io/part-of: banking
spec:
  description: Build the application using pnpm and Docker
  workspaces:
    - name: source
      description: The workspace containing the source code
  params:
    - name: image-name
      type: string
      description: The Docker image name (without tag)
    - name: image-tag
      type: string
      description: The Docker image tag
      default: latest
    - name: dockerfile
      type: string
      description: Path to Dockerfile
      default: ./Dockerfile
    - name: build-context
      type: string
      description: Docker build context directory
      default: "."
    - name: registry
      type: string
      description: Container registry URL
      default: ghcr.io
  results:
    - name: image-digest
      description: The image digest
    - name: image-url
      description: Full image URL
  steps:
    - name: install-deps
      image: node:20-slim
      workingDir: "$(workspaces.source.path)"
      script: |
        #!/bin/sh
        set -euo pipefail

        if [ -f pnpm-lock.yaml ]; then
          corepack enable
          corepack prepare pnpm@latest --activate
          pnpm install --frozen-lockfile --prod
        elif [ -f package-lock.json ]; then
          npm ci --omit=dev
        elif [ -f yarn.lock ]; then
          yarn install --production --frozen-lockfile
        else
          npm install --omit=dev
        fi
    - name: run-build
      image: node:20-slim
      workingDir: "$(workspaces.source.path)"
      script: |
        #!/bin/sh
        set -euo pipefail

        if [ -f pnpm-lock.yaml ]; then
          corepack enable
          corepack prepare pnpm@latest --activate
          pnpm build
        elif [ -f package.json ]; then
          npm run build --if-present
        fi
    - name: build-and-push
      image: gcr.io/kaniko-project/executor:v1.22.0
      workingDir: "$(workspaces.source.path)"
      env:
        - name: DOCKER_CONFIG
          value: /tekton/home/.docker
      script: |
        #!/bin/sh
        set -euo pipefail

        IMAGE="$(params.registry)/$(params.image-name):$(params.image-tag)"
        echo "Building $IMAGE"

        /kaniko/executor \
          --context="$(workspaces.source.path)/$(params.build-context)" \
          --dockerfile="$(workspaces.source.path)/$(params.dockerfile)" \
          --destination="$IMAGE" \
          --cache=true \
          --cache-ttl=72h \
          --snapshot-mode=redo \
          --reproducible \
          --push-retry=3

        echo -n "$IMAGE" > "$(results.image-url.path)"
        crane digest "$IMAGE" > "$(results.image-digest.path)" 2>/dev/null || true
