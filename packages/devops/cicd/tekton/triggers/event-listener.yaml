apiVersion: tekton.dev/v1beta1
kind: EventListener
metadata:
  name: github-event-listener
  namespace: cicd
  labels:
    app.kubernetes.io/part-of: banking
spec:
  serviceAccountName: tekton-triggers-github-sa
  triggers:
    - triggerRef: github-push-trigger
    - triggerRef: github-tag-trigger
  resources:
    kubernetesResource:
      spec:
        template:
          spec:
            serviceAccountName: tekton-triggers-github-sa
            containers:
              - resources:
                  requests:
                    memory: 256Mi
                    cpu: 100m
                  limits:
                    memory: 512Mi
                    cpu: 250m
                env:
                  - name: TEKTON_NAMESPACE
                    value: cicd
---
apiVersion: v1
kind: Service
metadata:
  name: el-github-event-listener
  namespace: cicd
  labels:
    app.kubernetes.io/part-of: banking
    app.kubernetes.io/name: event-listener
spec:
  ports:
    - port: 8080
      targetPort: 8080
      name: http
  selector:
    app.kubernetes.io/managed-by: tekton-triggers
    app.kubernetes.io/part-of: banking
    eventlistener: github-event-listener
  type: ClusterIP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: el-github-event-listener
  namespace: cicd
  annotations:
    kubernetes.io/ingress.class: nginx
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
  labels:
    app.kubernetes.io/part-of: banking
    app.kubernetes.io/name: event-listener
spec:
  tls:
    - hosts:
        - webhook.banking.internal
      secretName: webhook-tls
  rules:
    - host: webhook.banking.internal
      http:
        paths:
          - path: /github
            pathType: Prefix
            backend:
              service:
                name: el-github-event-listener
                port:
                  number: 8080
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: tekton-triggers-github-sa
  namespace: cicd
  labels:
    app.kubernetes.io/part-of: banking
secrets:
  - name: github-webhook-secret
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: tekton-triggers-github-role
  namespace: cicd
  labels:
    app.kubernetes.io/part-of: banking
rules:
  - apiGroups: ["tekton.dev"]
    resources: ["pipelineruns", "pipelineresources", "runs"]
    verbs: ["create", "get", "list", "watch", "update", "patch"]
  - apiGroups: ["tekton.dev"]
    resources: ["pipelineruns/finalizers"]
    verbs: ["update"]
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: tekton-triggers-github-binding
  namespace: cicd
  labels:
    app.kubernetes.io/part-of: banking
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: tekton-triggers-github-role
subjects:
  - kind: ServiceAccount
    name: tekton-triggers-github-sa
    namespace: cicd
