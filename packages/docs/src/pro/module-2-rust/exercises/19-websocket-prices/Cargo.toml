[package]
name = "websocket-prices"
version = "0.1.0"
edition = "2021"

[[bin]]
name = "websocket-prices"
path = "main.rs"

[dependencies]
tokio = { version = "1", features = ["full"] }
tokio-tungstenite = "0.21"
tungstenite = "0.21"
futures-util = "0.3"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
