      PORT: 3008
      REDIS_URI: ${REDIS_URI:-redis://:redis_secret_2024@redis:6379}
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - banking-net

  # ── Frontend Services ───────────────────────────────────────────────

  landing-page:
    image: banking/landing-page:dev
    build:
      context: .
      dockerfile: packages/frontend/landing-page/Dockerfile
    container_name: banking-landing-page
    restart: unless-stopped
    ports:
      - "5173:5173"
    volumes:
      - ./packages/frontend/landing-page:/app
      - /app/node_modules
    environment:
      NODE_ENV: development
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:3000}
    depends_on:
      - ledger
    networks:
      - banking-net

  kyc-system:
    image: banking/kyc-system:dev
    build:
      context: .
      dockerfile: packages/frontend/kyc-system/Dockerfile
    container_name: banking-kyc-system
    restart: unless-stopped
    ports:
      - "5174:5174"
    volumes:
      - ./packages/frontend/kyc-system:/app
      - /app/node_modules
    environment:
      NODE_ENV: development
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:3000}
    depends_on:
      - ledger
    networks:
      - banking-net
