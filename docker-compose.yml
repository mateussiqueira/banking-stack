name: banking-stack

volumes:
  mongodb-data:
  redis-data:
  postgres-data:
  minio-data:

networks:
  banking-net:
    driver: bridge

services:
  mongodb:
    image: mongo:7
    container_name: banking-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongodb-data:/data/db
      - ./services/mongodb/init-replica.js:/docker-entrypoint-initdb.d/init-replica.js:ro
    environment:
      MONGO_INITDB_DATABASE: banking_challenges
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USER:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD:-mongo_secret_2024}
    command:
      - --replSet
      - rs0
      - --keyFile
      - /data/keyfile
      - --bind_ip_all
    healthcheck:
      test: |
        mongosh --quiet --eval "
          try {
            rs.status().ok;
          } catch(e) {
            rs.initiate({
              _id: 'rs0',
              members: [{ _id: 0, host: 'localhost:27017' }]
            }).ok;
          }
        " | grep -q 1
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s
    networks:
      - banking-net

  redis:
    image: redis:7-alpine
    container_name: banking-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command:
      - redis-server
      - --appendonly
      - "yes"
      - --requirepass
      - ${REDIS_PASSWORD:-redis_secret_2024}
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - banking-net

  postgres:
    image: postgres:16-alpine
    container_name: banking-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-banking_challenges}
      POSTGRES_USER: ${POSTGRES_USER:-banking}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres_secret_2024}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-banking} -d ${POSTGRES_DB:-banking_challenges}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - banking-net

  minio:
    image: minio/minio
    container_name: banking-minio
    restart: unless-stopped
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minio_secret_2024}
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - banking-net
